name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python tests/fixtures/generate_fixtures.py
      - run: python -m etl.build --fixtures tests/fixtures
      - env:
          H1B_TESTING: "1"
          OTP_SECRET: ci-test-otp-secret
        run: pytest -v
      - run: ruff check .

      - name: Testmail e2e (optional)
        env:
          TESTMAIL_API_KEY: ${{ secrets.TESTMAIL_API_KEY }}
          TESTMAIL_NAMESPACE: ${{ secrets.TESTMAIL_NAMESPACE }}
          OTP_SECRET: ci-test-otp-secret
        run: |
          if [ -z "$TESTMAIL_API_KEY" ] || [ -z "$TESTMAIL_NAMESPACE" ]; then
            echo "Testmail e2e skipped — set TESTMAIL_API_KEY and TESTMAIL_NAMESPACE secrets."
            exit 0
          fi
          pytest tests/test_testmail_e2e.py -v
